<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="50%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#ffe4e6"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="400" height="400" rx="90" fill="url(#bg)"/>

  <!-- 헤더 구분선 -->
  <line x1="40" y1="96" x2="360" y2="96" stroke="#d8b4d8" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- 요일 도트 5개 -->
  <circle cx="76"  cy="68" r="5"   fill="#c084c8" opacity="0.4"/>
  <circle cx="139" cy="68" r="7.5" fill="#a855a8"/>
  <circle cx="202" cy="68" r="5"   fill="#c084c8" opacity="0.4"/>
  <circle cx="265" cy="68" r="5"   fill="#c084c8" opacity="0.4"/>
  <circle cx="328" cy="68" r="5"   fill="#c084c8" opacity="0.25"/>

  <!-- 세로 열 구분선 -->
  <line x1="108" y1="40" x2="108" y2="370" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="171" y1="40" x2="171" y2="370" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="234" y1="40" x2="234" y2="370" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="297" y1="40" x2="297" y2="370" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 가로 시간 구분선 -->
  <line x1="40" y1="155" x2="360" y2="155" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="40" y1="220" x2="360" y2="220" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="40" y1="295" x2="360" y2="295" stroke="#d8b4d8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 일정 블록 5개 -->
  <!-- 열1: x=40~108 -->
  <rect x="48"  y="165" width="52" height="100" rx="13" fill="#f9a8d4" opacity="0.95"/>

  <!-- 열2: x=108~171 -->
  <rect x="116" y="106" width="47" height="118" rx="13" fill="#c084fc" opacity="0.85"/>

  <!-- 열3: x=171~234 -->
  <rect x="179" y="232" width="47" height="90"  rx="13" fill="#5eead4" opacity="0.8"/>

  <!-- 열4: x=234~297 -->
  <rect x="242" y="112" width="47" height="130" rx="13" fill="#fbbf24" opacity="0.8"/>

  <!-- 열5: x=297~360 -->
  <rect x="305" y="152" width="47" height="90"  rx="13" fill="#86efac" opacity="0.85"/>
</svg>